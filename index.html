<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Amor ❤️</title>
    <style>
        :root {
            --neon-pink: #ff00ff;
            --hot-pink: #d81b60;
            --soft-pink: #ffccff;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Arial', sans-serif;
            background-color: var(--soft-pink);
        }

        /* --- CONTENEDOR PRINCIPAL (PORTADA) --- */
        #portada {
            position: absolute;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000; /* Siempre al frente al cargar */
            background-color: var(--soft-pink);
        }

        .portada-title {
            color: var(--hot-pink);
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-align: center;
        }

        .btn-retro {
            background-color: white;
            border: 2px solid var(--hot-pink);
            color: var(--hot-pink);
            padding: 15px 30px;
            font-size: 1.1rem;
            margin: 10px;
            cursor: pointer;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            width: 220px;
            box-shadow: 0 4px 0px #c2185b;
        }

        .btn-retro:hover {
            background-color: var(--hot-pink);
            color: white;
            transform: translateY(-3px);
        }

        /* --- CARTA --- */
        #carta {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            width: 80%;
            max-width: 400px;
            border-radius: 20px;
            border: 3px solid #f48fb1;
            z-index: 2000;
            text-align: center;
            box-shadow: 0 10px 50px rgba(0,0,0,0.2);
        }

        /* --- ESCENARIO NEÓN --- */
        #neon-stage {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            z-index: 500;
        }

        .grid-container {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(0deg, rgba(0,255,255,0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,255,255,0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        #neon-text-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 600; text-align: center; width: 100%;
            pointer-events: none;
        }

        .neon-text-base {
            color: #fff; font-size: 2.8rem; font-weight: 900;
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--neon-pink), 0 0 30px var(--neon-pink);
        }

        .orbit-item { position: absolute; pointer-events: none; }
        .character-orbit img { width: 100px; filter: drop-shadow(0 0 8px #ff1493); }

        #btn-volver {
            position: absolute; top: 20px; right: 20px; z-index: 3000;
            padding: 10px 20px; background: black; border: 1px solid var(--neon-pink);
            color: var(--neon-pink); cursor: pointer; border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="portada">
        <h1 class="portada-title">Para Mi Amor ❤️</h1>
        <button class="btn-retro" onclick="abrirCarta()">❤️ cartita para vos ❤️ </button>
        <button class="btn-retro" onclick="abrirNeon()"> ❤️ una sorpresa ❤️ </button>
    </div>

    <div id="carta">
        <h2 style="color: var(--hot-pink);">Hola mi vida ❤️</h2>
        <p>Hice esto para recordarte lo mucho que te amo. Eres la persona más especial del mundo.</p>





        
        <button class="btn-retro" style="width: 150px;" onclick="cerrarTodo()">Cerrar</button>
    </div>

    <div id="neon-stage">
        <button id="btn-volver" onclick="cerrarTodo()">Volver</button>
        <div class="grid-container"></div>
        <div id="orbit-layer" style="position:relative; width:100%; height:100%; display:flex; justify-content:center; align-items:center;"></div>
        <div id="neon-text-container">
            <h1 class="neon-text-base">para la mas linda del mundo</h1>
        </div>
    </div>

    <script>
        const imagenesUrls = [
            "https://i.postimg.cc/2SN1v6vZ/Encuentra-el-regalo-hecho-a-mano-perfecto-prendas-removebg-preview.png",
            "https://i.postimg.cc/gJB2ScTQ/retouch-2026032018191540.png",
            "https://i.postimg.cc/GhDmKCJJ/retouch-2026032018130123.png",
            "https://i.postimg.cc/28WSGDF4/retouch-2026032018133312.png",
            "https://i.postimg.cc/DfHz1Zsj/retouch-2026032018142587.png",
            "https://i.postimg.cc/DfHz1ZsB/retouch-2026032018161589.png",
            "https://i.postimg.cc/HWRLbx5S/retouch-2026032018180187.png"
        ];

        const frasesTextos = ["Te amo", "Mi sol", "Mi vida", "Siempre juntos", "Love you", "Mi todo", "me encantas", "contigo soy feliz",
                            "te quiero", "hoy,mañana y siemple", "te amoo", "eres especial", 
                            "Te amo", "Mi sol", "Mi vida", "Siempre juntos", "Love you", "Mi todo", "me encantas", "contigo soy feliz",
                            "te quiero", "hoy,mañana y siemple", "te amoo", "eres especial"
                             ];
        const colores = ["#ff00ff", "#00ffff", "#00ff00", "#ffff00", "#ff8000"];

        let elementosOrbitantes = [];
        let animando = false;

        function abrirCarta() {
            document.getElementById('carta').style.display = 'block';
        }

        function abrirNeon() {
            document.getElementById('portada').style.display = 'none';
            document.getElementById('carta').style.display = 'none';
            document.getElementById('neon-stage').style.display = 'block';
            
            if (!animando) {
                crearOrbitas();
                animar();
                animando = true;
            }
        }

        function cerrarTodo() {
            location.reload(); 
        }

        function crearOrbitas() {
            const layer = document.getElementById('orbit-layer');
            const isMobile = window.innerWidth < 600;

            imagenesUrls.forEach((url, i) => {
                const div = document.createElement('div');
                div.className = 'orbit-item character-orbit';
                div.innerHTML = `<img src="${url}" style="width:${isMobile ? '70px' : '110px'};">`;
                layer.appendChild(div);
                elementosOrbitantes.push({
                    el: div,
                    angulo: i * (Math.PI * 2 / imagenesUrls.length),
                    rx: isMobile ? 140 : 280, 
                    ry: isMobile ? 70 : 130,
                    vel: 0.005
                });
            });

            frasesTextos.forEach((txt, i) => {
                const span = document.createElement('span');
                span.className = 'orbit-item';
                span.innerText = txt;
                const col = colores[Math.floor(Math.random()*colores.length)];
                span.style.color = col;
                span.style.fontWeight = 'bold';
                span.style.textShadow = `0 0 10px ${col}`;
                layer.appendChild(span);
                elementosOrbitantes.push({
                    el: span,
                    angulo: i * (Math.PI * 2 / frasesTextos.length) + 0.5,
                    rx: isMobile ? 180 : 380, 
                    ry: isMobile ? 100 : 200,
                    vel: 0.008
                });
            });
        }

        function animar() {
            elementosOrbitantes.forEach(obj => {
                obj.angulo += obj.vel;
                const x = Math.cos(obj.angulo) * obj.rx;
                const y = Math.sin(obj.angulo) * obj.ry;
                const s = 0.6 + (Math.sin(obj.angulo) + 1) * 0.3;
                
                obj.el.style.transform = `translate(${x}px, ${y}px) scale(${s})`;
                obj.el.style.zIndex = Math.round(s * 100);
                obj.el.style.opacity = 0.5 + (Math.sin(obj.angulo) + 1) * 0.5;
            });
            requestAnimationFrame(animar);
        }
    </script>
</body>
</html>
