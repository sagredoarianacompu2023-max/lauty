<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Amor ❤️</title>
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --pink-bg: #ffccff; /* Color sólido de respaldo si no carga el GIF */
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Evita barras de desplazamiento */
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--pink-bg);
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.5s;
        }

        /* --- SECCIÓN PORTADA (Inicio) --- */
        #portada {
            text-align: center;
            display: block;
            z-index: 500; /* Número muy alto para que esté arriba de todo */
        }

        .portada-title {
            color: #d81b60;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin-bottom: 50px;
        }

        .btn-retro {
            background-color: transparent;
            border: 2px solid #d81b60;
            color: #d81b60;
            padding: 15px 35px;
            font-size: 1.15rem;
            margin: 10px;
            cursor: pointer;
            border-radius: 50px;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px #c2185b;
            position: relative;
            z-index: 501; /* Asegura que el botón sea cliqueable */
            width: 200px;
        }

        .btn-retro:hover {
            background-color: #d81b60;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 6px #c2185b;
        }

        .btn-retro:active {
            box-shadow: 0 0 #c2185b;
            transform: translateY(4px);
        }

        /* --- SECCIÓN CARTA DE AMOR --- */
        #carta {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            width: 85%;
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.2);
            border: 3px solid #f48fb1;
            transform: scale(0.8);
            opacity: 0;
            transition: 0.5s;
            z-index: 600; /* Por encima de la portada al abrir */
            position: fixed; /* Centrado absoluto */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
        }

        #carta.active {
            display: block;
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .carta-content {
            color: #444;
            line-height: 1.6;
            font-size: 1.15rem;
            text-align: center;
        }

        /* --- SECCIÓN ESCENARIO NEÓN (Actualizada con Mejoras) --- */
        #neon-stage {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 100; /* Por debajo de la portada y carta al inicio */
        }

        /* Cuadrícula Retro (Fondo) */
        .grid-container {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, rgba(0,255,255,0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,255,255,0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* El Texto Central Neón (Actualizado) */
        #neon-text-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            text-align: center;
            font-family: sans-serif;
            z-index: 200; /* Por encima de las órbitas */
            pointer-events: none; /* No interfiere con clics */
        }

        .neon-text-base {
            color: #fff;
            font-size: 3rem; /* Tamaño base imponente */
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 0;
            text-shadow: 0 0 15px var(--neon-pink), 0 0 30px var(--neon-pink);
        }

        /* --- ELEMENTOS QUE ORBITARÁN (Nuevos Estilos) --- */
        .orbit-item {
            position: absolute;
            pointer-events: none;
        }

        /* Estilos específicos para los Dibujos PNG Orbitantes */
        .character-orbit img {
            width: 100%; /* El contenedor .orbit-item define el tamaño */
            height: auto;
            display: block;
            /* Brillo neón rosa que sigue la forma del PNG transparente */
            filter: drop-shadow(0 0 8px #ff1493); 
        }

        /* Estilos específicos para las Frases Pequeñas Orbitantes */
        .phrase-orbit {
            font-weight: bold;
            font-size: 1.1rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6); /* Brillo base */
            white-space: nowrap; /* Evita que el texto se parta */
        }

            position: absolute;
            top: 20px;
            right: 20
