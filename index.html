<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Amor ❤️</title>
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --pink-bg: #ffccff;
        }

        body {
            margin: 0; padding: 0; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--pink-bg);
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }

        /* --- PORTADA --- */
        #portada { text-align: center; z-index: 100; display: block; }
        .portada-title { color: #d81b60; font-size: 2.5rem; margin-bottom: 40px; text-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        
        .btn-retro {
            background: white; border: 2px solid #d81b60; color: #d81b60;
            padding: 15px 30px; font-size: 1.1rem; margin: 10px; cursor: pointer;
            border-radius: 50px; font-weight: bold; transition: 0.3s;
            box-shadow: 0 4px #c2185b;
        }
        .btn-retro:hover { background: #d81b60; color: white; transform: translateY(-3px); }

        /* --- CARTA --- */
        #carta {
            display: none; background: white; padding: 30px; width: 85%; max-width: 500px;
            border-radius: 20px; border: 3px solid #f48fb1; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 101;
        }
        #carta.active { display: block; }

        /* --- ESCENARIO NEÓN --- */
        #neon-stage {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; z-index: 150;
        }
        #neon-stage.active { display: block; }

        .grid-container {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(0deg, rgba(0,255,255,0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Texto Central */
        #neon-text-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 200; text-align: center; width: 100%; pointer-events: none;
        }
        .neon-text-base {
            color: #fff; font-size: 3rem; text-transform: uppercase; font-weight: 900;
            text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink);
        }

        /* Elementos que orbitan */
        .orbit-item { position: absolute; pointer-events: none; }
        .character-orbit img { border-radius: 10px; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .phrase-orbit { font-weight: bold; white-space: nowrap; }

        #btn-volver {
            position: absolute; top: 20px; right: 20px; z-index: 300;
            padding: 10px; background: none; border: 1px solid var(--neon-pink);
            color: var(--neon-pink); cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="portada">
        <h1 class="portada-title">Para Mi Amor ❤️</h1>
        <button class="btn-retro" onclick="abrirCarta()">Una Carta</button>
        <button class="btn-retro" onclick="abrirNeon()">Imagen 3D</button>
    </div>

    <div id="carta">
        <h2 style="color: #d81b60;">Hola mi vida ❤️</h2>
        <p>Hice esto para recordarte lo mucho que te amo. Eres la persona más especial y quiero que siempre tengas este rinconcito para sonreír.</p>
        <button class="btn-retro" style="font-size: 0.9rem;" onclick="cerrarTodo()">Cerrar</button>
    </div>

    <div id="neon-stage">
        <button id="btn-volver" onclick="cerrarTodo()">Volver</button>
        <div class="grid-container"></div>
        <div id="orbit-layer" style="position:relative; width:100%; height:100%; display:flex; justify-content:center; align-items:center;"></div>
        <div id="neon-text-container">
            <h1 class="neon-text-base">Amor de mi vida</h1>
        </div>
    </div>

    <script>
        const imagenes = [
            "https://i.postimg.cc/wjw6wTZK/descargar-(5).jpg",
            "https://i.postimg.cc/Mp9W9K4h/descargar-(6).jpg",
            "https://i.postimg.cc/jSMsMd9p/descargar-(7).jpg",
            "https://i.postimg.cc/HkYY07ZC/descargar-(8).jpg",
            "https://i.postimg.cc/K80Z0vwF/Encuentra-el-regalo-hecho-a-mano-perfecto-prendas.jpg",
            "https://i.postimg.cc/YCdpdqZK/Spider-man-and-hello-kitty.jpg",
            "https://i.postimg.cc/Dwx2xyHh/ㅤ.jpg"
        ];
        const frases = ["Te amo", "Eres mi sol", "Mi vida", "Siempre juntos", "Me encantas", "Love you", "Mi todo"];
        const frases = ["Te amo", "Eres mi sol", "Mi vida", "Siempre juntos", "Me encantas", "Love you", "Mi todo"];
        const frases = ["Te amo", "Eres mi sol", "Mi vida", "Siempre juntos", "Me encantas", "Love you", "Mi todo"];
        const frases = ["Te amo", "Eres mi sol", "Mi vida", "Siempre juntos", "Me encantas", "Love you", "Mi todo"];
        const colores = ["#ff00ff", "#00ffff", "#00ff00", "#ffff00", "#ff8000"];

        let elementos = [];
        let animando = false;

        function abrirCarta() {
            document.getElementById('portada').style.display = 'none';
            document.getElementById('carta').classList.add('active');
        }

        function abrirNeon() {
            document.getElementById('portada').style.display = 'none';
            document.getElementById('neon-stage').classList.add('active');
            if (!animando) {
                crearOrbitas();
                loop();
                animando = true;
            }
        }

        function cerrarTodo() {
            location.reload(); // La forma más limpia de resetear todo
        }

        function crearOrbitas() {
            const layer = document.getElementById('orbit-layer');
            
            // Crear imágenes orbitantes
            imagenes.forEach((url, i) => {
                const div = document.createElement('div');
                div.className = 'orbit-item character-orbit';
                div.innerHTML = `<img src="${url}" style="width:100px;">`;
                layer.appendChild(div);
                elementos.push({
                    el: div,
                    angulo: (i * (Math.PI * 2 / imagenes.length)),
                    radioX: 250, radioY: 120,
                    vel: 0.005, tipo: 'img'
                });
            });

            // Crear frases orbitantes
            frases.forEach((txt, i) => {
                const span = document.createElement('span');
                span.className = 'orbit-item phrase-orbit';
                span.innerText = txt;
                const col = colores[Math.floor(Math.random()*colores.length)];
                span.style.color = col;
                span.style.textShadow = `0 0 10px ${col}`;
                layer.appendChild(span);
                elementos.push({
                    el: span,
                    angulo: (i * (Math.PI * 2 / frases.length)) + 0.5,
                    radioX: 350, radioY: 180,
                    vel: 0.008, tipo: 'txt'
                });
            });
        }

        function loop() {
            elementos.forEach(obj => {
                obj.angulo += obj.vel;
                const x = Math.cos(obj.angulo) * obj.radioX;
                const y = Math.sin(obj.angulo) * obj.radioY;
                const s = 0.5 + (Math.sin(obj.angulo) + 1) * 0.25; // Efecto de tamaño 3D
                
                obj.el.style.transform = `translate(${x}px, ${y}px) scale(${s})`;
                obj.el.style.zIndex = Math.round(s * 100);
            });
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
