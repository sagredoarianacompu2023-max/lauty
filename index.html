<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amor Eterno ❤️</title>
    <style>
        /* CSS GENERAL Y DE FONDO */
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --neon-green: #00ff00;
            --neon-yellow: #ffff00;
            --neon-orange: #ff8000;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Evita barras de desplazamiento */
            background-color: #000; /* Fondo negro profundo */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px; /* Para efecto 3D en la cuadrícula */
        }

        /* --- ESCENARIO DE ANIMACIÓN (Ahora principal) --- */
        #neon-stage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block; /* Visible por defecto */
        }

        /* Cuadrícula Retro (Fondo) */
        .grid-container {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, rgba(0,255,255,0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .grid-floor {
            position: absolute;
            width: 200%;
            height: 100%;
            bottom: 0;
            left: -50%;
            background: inherit;
            transform: rotateX(60deg);
            transform-origin: center bottom;
        }

        /* El Texto Central (Fijo y Brillante) */
        #neon-text-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            z-index: 100; /* Por encima de los elementos que orbitan */
            pointer-events: none; /* No interfiere con clics */
        }

        .neon-text-base {
            color: #fff;
            font-size: 3.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 0;
            text-shadow: 0 0 10px #ff1493, 0 0 20px #ff1493, 0 0 30px #ff1493; /* Brillo rosa intenso */
        }

        /* --- ELEMENTOS ORBITANTES (Imágenes y Frases) --- */
        #orbit-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50; /* Por debajo del texto central */
        }

        /* Estilos para las Imágenes (Dibujos) Orbitantes */
        .character-orbit {
            position: absolute;
            transition: transform 0.05s linear; /* Movimiento suave */
            pointer-events: none;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .character-orbit img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Estilos para las Frases Pequeñas Orbitantes */
        .phrase-orbit {
            position: absolute;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            font-size: 1.1rem;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5); /* Brillo base */
            white-space: nowrap
